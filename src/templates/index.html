<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Surveillance Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --color-safe: #10b981;
            --color-danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 24px;
            text-align: center;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .container {
            flex: 1;
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.1);
        }

        .card.alert {
            border-color: var(--color-danger);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
            animation: pulse-danger 1.5s infinite alternate;
        }

        @keyframes pulse-danger {
            0% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
            100% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-safe);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-safe);
            box-shadow: 0 0 8px var(--color-safe);
        }

        .card.alert .status-badge {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .card.alert .status-badge .dot {
            background: var(--color-danger);
            box-shadow: 0 0 8px var(--color-danger);
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .video-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.5s ease;
        }

        .card:hover .video-wrapper img {
            transform: scale(1.02);
        }

        /* 🚨 TOAST NOTIFICATIONS */
        #toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 16px 20px;
            border-radius: 12px;
            border-left: 4px solid var(--color-danger);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(239, 68, 68, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards, fadeOut 0.4s ease 4.6s forwards;
            font-weight: 500;
            max-width: 350px;
        }

        .toast-icon {
            font-size: 24px;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both infinite;
        }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-2px, 0, 0); }
            40%, 60% { transform: translate3d(2px, 0, 0); }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>AI Surveillance</h1>
    <p>Live Weapon Detection Dashboard</p>
</header>

<div class="container">
    {% for camera in cameras %}
    <div class="card" id="card-{{ camera.id }}">
        <div class="card-header">
            <h2>📷 {{ camera.name }}</h2>
            <div class="status-badge" id="badge-{{ camera.id }}">
                <div class="dot"></div>
                <span id="status-text-{{ camera.id }}">Secure</span>
            </div>
        </div>
        <div class="video-wrapper">
            <img src="/video/{{ camera.id }}" alt="Live feed from {{ camera.name }}">
        </div>
    </div>
    {% endfor %}
</div>

<div id="toast-container"></div>

<script>
// Keep track of active alerts to prevent spamming toasts
const activeAlerts = new Set();
const cameras = [
    {% for camera in cameras %}
    { id: {{ camera.id }}, name: "{{ camera.name }}" }{% if not loop.last %},{% endif %}
    {% endfor %}
];

function checkDetection() {
    fetch('/status')
        .then(res => res.json())
        .then(data => {
            if (data.detections) {
                cameras.forEach(camera => {
                    const isDetected = data.detections[camera.id];
                    const card = document.getElementById(`card-${camera.id}`);
                    const badgeText = document.getElementById(`status-text-${camera.id}`);
                    
                    if (isDetected) {
                        // Update UI
                        card.classList.add('alert');
                        badgeText.textContent = 'Threat Detected';
                        
                        // Show toast if not already alerted recently
                        if (!activeAlerts.has(camera.id)) {
                            showToast(camera.name);
                            activeAlerts.add(camera.id);
                            
                            // Reset alert tracking after 10 seconds
                            setTimeout(() => {
                                activeAlerts.delete(camera.id);
                            }, 10000);
                        }
                    } else {
                        // Revert UI if safe
                        card.classList.remove('alert');
                        badgeText.textContent = 'Secure';
                    }
                });
            }
        })
        .catch(err => console.error("Error fetching status:", err));
}

function showToast(cameraName) {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerHTML = `
        <div class="toast-icon">⚠️</div>
        <div>
            <div style="font-weight: 800; font-size: 16px; margin-bottom: 4px; color: #fca5a5;">Weapon Detected!</div>
            <div style="font-size: 13px; color: #cbd5e1;">Location: ${cameraName}</div>
        </div>
    `;
    
    container.appendChild(toast);

    // Remove toast DOM element after animation ends (5s)
    setTimeout(() => {
        if(container.contains(toast)) {
            container.removeChild(toast);
        }
    }, 5000);
}

// Check every 1 second for faster response
setInterval(checkDetection, 1000);
</script>

</body>
</html>
